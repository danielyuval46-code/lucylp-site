<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1260" role="img" aria-labelledby="title desc">
  <title id="title">LucyLP Music Press Beatles Touring History Cover</title>
  <desc id="desc">A vintage music magazine cover with a touring-era stage artwork, warm spotlights, bold masthead typography, and collector cover lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#23120e"/>
      <stop offset="0.38" stop-color="#070707"/>
      <stop offset="1" stop-color="#120707"/>
    </linearGradient>
    <radialGradient id="goldLight" cx="50%" cy="20%" r="70%">
      <stop offset="0" stop-color="#f6e7b0" stop-opacity="0.82"/>
      <stop offset="0.28" stop-color="#d4af37" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.84"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="22"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.1"/></feComponentTransfer>
    </filter>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#000" flood-opacity="0.74"/></filter>
  </defs>
  <rect width="900" height="1260" fill="url(#bg)"/>
  <rect width="900" height="1260" fill="url(#goldLight)"/>
  <g opacity="0.78" filter="url(#shadow)">
    <path d="M90 500 L230 238 L278 258 L150 526 Z" fill="#d4af37" opacity="0.18"/>
    <path d="M810 500 L670 238 L622 258 L750 526 Z" fill="#d4af37" opacity="0.18"/>
    <path d="M244 430 L286 430 L305 760 L226 760 Z" fill="#090909"/>
    <path d="M388 410 L430 410 L450 790 L365 790 Z" fill="#0b0b0b"/>
    <path d="M530 410 L572 410 L595 790 L508 790 Z" fill="#0b0b0b"/>
    <path d="M672 430 L714 430 L734 760 L654 760 Z" fill="#090909"/>
    <circle cx="265" cy="398" r="44" fill="#111" stroke="#f6e7b0" stroke-width="5"/>
    <circle cx="409" cy="378" r="44" fill="#111" stroke="#d4af37" stroke-width="5"/>
    <circle cx="551" cy="378" r="44" fill="#111" stroke="#d4af37" stroke-width="5"/>
    <circle cx="693" cy="398" r="44" fill="#111" stroke="#f6e7b0" stroke-width="5"/>
    <path d="M164 762 C338 706 552 708 736 762 L736 875 L164 875 Z" fill="#111" stroke="#d4af37" stroke-opacity="0.22"/>
