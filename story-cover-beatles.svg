  <text x="78" y="770" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#f6e7b0">THE ROOFTOP CONCERT</text>
  <text x="78" y="808" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#d4af37">LIVE HISTORY BEFORE THE WALKAWAY</text>
