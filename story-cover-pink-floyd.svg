<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1260" role="img" aria-labelledby="title desc">
  <title id="title">LucyLP Music Press Pink Floyd Japan Pressings Cover</title>
  <desc id="desc">A vintage music magazine cover with dramatic stage lights, a prism-inspired rock artwork, and editorial collector cover lines.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#271616"/>
      <stop offset="0.42" stop-color="#050505"/>
      <stop offset="1" stop-color="#130707"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="30%" r="62%">
