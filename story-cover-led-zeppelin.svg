  <text x="90" y="742" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#f6e7b0">CLASSIC ROCK MAGAZINE</text>
  <line x1="590" y1="508" x2="590" y2="706" stroke="#d4af37" stroke-width="7"/>
  <text x="612" y="548" font-family="Arial, sans-serif" font-size="27" font-weight="900" fill="#f6e7b0">DEADWAX</text>
  <text x="612" y="588" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#d4af37">CLUES</text>
  <text x="612" y="626" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#d4af37">HOT CUT</text>
  <text x="612" y="664" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#d4af37">VALUE</text>
  <text x="78" y="826" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#f6e7b0">ONE TINY MARK. ONE LEGENDARY PRESSING.</text>
  <text x="78" y="864" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#d4af37">WHY COLLECTORS STILL HUNT THE RL</text>
