  <rect x="46" y="46" width="808" height="1168" fill="none" stroke="#d4af37" stroke-opacity="0.24" stroke-width="1"/>
  <text x="450" y="116" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900" fill="#f6e7b0">LucyLP</text>
  <text x="450" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#d4af37">MUSIC PRESS</text>
  <line x1="72" y1="186" x2="828" y2="186" stroke="#f6e7b0" stroke-opacity="0.56" stroke-width="3"/>
  <text x="72" y="232" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#f6e7b0">ISSUE 03 / PRESSING MYSTERY</text>
  <text x="828" y="232" text-anchor="end" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#d4af37">HARD ROCK FILES</text>
  <text x="70" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="900" fill="#fff6d7">LED</text>
  <text x="70" y="435" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="900" fill="#fff6d7">ZEPPELIN</text>
  <text x="70" y="522" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="900" fill="#d4af37">II</text>
  <text x="70" y="600" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="900" fill="#fff6d7">THE RL</text>
  <text x="70" y="672" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="900" fill="#fff6d7">MYSTERY</text>
