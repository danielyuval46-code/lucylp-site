  <text x="450" y="1091" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#f6e7b0">HOT MASTERING / FIRST PRESSING LORE / COLLECTOR VALUE</text>
  <text x="450" y="1124" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#9b2020">A LUCYLP PRESSING FILE</text>
  <rect width="900" height="1260" filter="url(#grain)" opacity="0.62"/>
