<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Buenos Aires Vinyl Culture</title>
  <desc id="desc">A dark editorial illustration of Buenos Aires record culture with warm street lights, crates, and vinyl silhouettes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2a0808"/>
      <stop offset="0.45" stop-color="#080808"/>
      <stop offset="1" stop-color="#151008"/>
    </linearGradient>
    <radialGradient id="lamp" cx="29%" cy="20%" r="56%">
      <stop offset="0" stop-color="#f6e7b0" stop-opacity="0.72"/>
      <stop offset="0.24" stop-color="#d4af37" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="3" seed="91"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.12"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="620" fill="url(#bg)"/>
  <rect width="900" height="620" fill="url(#lamp)"/>
  <path d="M0 454 C170 392 292 480 448 430 C620 374 738 412 900 340 L900 620 L0 620 Z" fill="#030303" opacity="0.8"/>
