<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LucyLP World Board Prototype</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;background:#171009;overflow:hidden}
    main{position:relative;width:100vw;height:100vh}
    img{display:block;width:100%;height:100%;object-fit:fill;user-select:none;-webkit-user-drag:none}
    .world-link{position:absolute;display:block;background:transparent;text-indent:-9999px;overflow:hidden}
    .world-link:focus-visible{outline:4px solid #f0a33b;outline-offset:3px}
    .blog-link{left:38%;top:18%;width:31%;height:62%}
    .vinyl-link{left:12%;top:39%;width:26%;height:29%}
    .manga-link{left:70%;top:41%;width:22%;height:28%}
  </style>
</head>
<body>
  <main aria-label="LucyLP World Board">
    <img src="WEB002.png" alt="Welcome to LucyLP World Board">
    <a class="world-link blog-link" href="/blog/how-cameras-worked-before-smartphones.html" aria-label="Blog and Community">Blog &amp; Community</a>
    <a class="world-link vinyl-link" href="/vinyl/" aria-label="Vinyl Finds">Vinyl Finds</a>
    <a class="world-link manga-link" href="/manga/" aria-label="Manga and Japan Finds">Manga &amp; Japan Finds</a>
  </main>
</body>
</html>
