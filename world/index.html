<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LucyLP World Board Prototype</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;background:#171009;overflow:hidden}
    main{display:grid;width:100vw;height:100vh;place-items:center}
    .world-board{position:relative;width:min(100vw,calc(100vh * 16 / 9));aspect-ratio:16/9}
    .world-board>img{display:block;width:100%;height:100%;user-select:none;-webkit-user-drag:none}
    .blog-community-window{
      position:absolute;
      right:1.5%;
      bottom:1.5%;
      width:13%;
      aspect-ratio:1;
      overflow:hidden;
      background:transparent;
      pointer-events:none;
    }
    .blog-community-window video{
      display:block;
      width:100%;
      height:100%;
      object-fit:cover;
      mix-blend-mode:multiply;
      transform:scale(1.3);
    }
  </style>
</head>
<body>
  <main aria-label="LucyLP World Board">
    <div class="world-board">
      <img src="WEB002.png" alt="Welcome to LucyLP World Board">
      <div class="blog-community-window" aria-label="Blog and Community preview">
        <video autoplay muted loop playsinline preload="metadata" aria-label="Animated Blog and Community preview">
          <source src="blog001.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </main>
</body>
</html>
