<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Tokyo Record Districts</title>
  <desc id="desc">A cinematic editorial illustration of Tokyo record districts with neon signs, OBI-style strips, and vinyl shop windows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#150707"/>
      <stop offset="0.45" stop-color="#050505"/>
      <stop offset="1" stop-color="#11110b"/>
    </linearGradient>
    <radialGradient id="neon" cx="69%" cy="22%" r="58%">
      <stop offset="0" stop-color="#f6e7b0" stop-opacity="0.68"/>
      <stop offset="0.22" stop-color="#d4af37" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="44"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.11"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="620" fill="url(#bg)"/>
  <rect width="900" height="620" fill="url(#neon)"/>
  <g opacity="0.78">
    <rect x="70" y="120" width="150" height="330" fill="#0b0b0b" stroke="#d4af37" stroke-opacity="0.28"/>
    <rect x="96" y="152" width="98" height="52" fill="#7a1717"/>
    <text x="145" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="900" fill="#f6e7b0">RECORDS</text>
    <rect x="286" y="78" width="230" height="392" fill="#0b0b0b" stroke="#f6e7b0" stroke-opacity="0.14"/>
    <rect x="326" y="126" width="54" height="280" fill="#d4af37"/>
    <rect x="398" y="126" width="54" height="280" fill="#7a1717"/>
    <rect x="610" y="146" width="168" height="306" fill="#0b0b0b" stroke="#d4af37" stroke-opacity="0.24"/>
    <rect x="638" y="184" width="112" height="48" fill="#d4af37"/>
  </g>
  <g transform="translate(320 320)">
    <circle cx="122" cy="122" r="120" fill="#080808" stroke="#d4af37" stroke-width="6"/>
    <circle cx="122" cy="122" r="78" fill="none" stroke="#f6e7b0" stroke-opacity="0.12" stroke-width="4"/>
    <circle cx="122" cy="122" r="30" fill="#7a1717" stroke="#d4af37" stroke-width="4"/>
  </g>
  <path d="M0 496 C230 428 406 548 612 486 C740 448 820 432 900 394 L900 620 L0 620 Z" fill="#030303" opacity="0.78"/>
  <text x="58" y="84" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="900" fill="#f6e7b0">Tokyo</text>
  <text x="58" y="134" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="900" fill="#fff6d7">Record Districts</text>
  <rect x="58" y="154" width="216" height="34" fill="#7a1717"/>
  <text x="76" y="178" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#f6e7b0">COLLECTOR JOURNAL</text>
  <text x="620" y="530" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#f6e7b0">OBI STRIPS</text>
  <text x="620" y="558" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#d4af37">CLEAN PRESSINGS</text>
  <rect x="24" y="24" width="852" height="572" fill="none" stroke="#f6e7b0" stroke-opacity="0.18" stroke-width="2"/>
  <rect width="900" height="620" filter="url(#grain)" opacity="0.62"/>
</svg>
