<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Berlin Flea Market Finds</title>
  <desc id="desc">A dark editorial illustration of Berlin flea markets with vinyl crates, industrial silhouettes, and progressive rock collector cues.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1f0b0b"/>
      <stop offset="0.5" stop-color="#060606"/>
      <stop offset="1" stop-color="#111008"/>
    </linearGradient>
    <radialGradient id="gold" cx="42%" cy="22%" r="60%">
      <stop offset="0" stop-color="#f6e7b0" stop-opacity="0.62"/>
      <stop offset="0.22" stop-color="#d4af37" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="3" seed="73"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.12"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="620" fill="url(#bg)"/>
  <rect width="900" height="620" fill="url(#gold)"/>
  <g opacity="0.65">
