  <text x="76" y="178" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#f6e7b0">COLLECTOR JOURNAL</text>
  <text x="570" y="532" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#f6e7b0">KRAUTROCK</text>
  <text x="570" y="560" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#d4af37">PROGRESSIVE VINYL</text>
  <rect x="24" y="24" width="852" height="572" fill="none" stroke="#f6e7b0" stroke-opacity="0.18" stroke-width="2"/>
