    <rect x="176" y="120" width="120" height="270" fill="#0b0b0b" stroke="#d4af37" stroke-opacity="0.18"/>
    <rect x="320" y="190" width="88" height="200" fill="#0b0b0b" stroke="#f6e7b0" stroke-opacity="0.1"/>
    <rect x="590" y="126" width="126" height="270" fill="#0b0b0b" stroke="#d4af37" stroke-opacity="0.16"/>
    <path d="M72 160 L116 88 L160 160 Z M610 126 L654 62 L698 126 Z" fill="#111"/>
  </g>
  <g transform="translate(116 372)">
    <rect x="0" y="34" width="300" height="120" fill="#110909" stroke="#d4af37" stroke-opacity="0.38"/>
    <path d="M32 62 H270 M32 96 H270 M32 130 H270" stroke="#f6e7b0" stroke-opacity="0.18" stroke-width="8"/>
    <circle cx="86" cy="28" r="62" fill="#080808" stroke="#9b2020" stroke-width="6"/>
    <circle cx="86" cy="28" r="18" fill="#d4af37"/>
  </g>
  <g transform="translate(604 330)">
    <rect x="0" y="76" width="190" height="120" fill="#0b0b0b" stroke="#d4af37" stroke-opacity="0.34"/>
    <path d="M24 104 H164 M24 138 H164 M24 172 H164" stroke="#f6e7b0" stroke-opacity="0.16" stroke-width="8"/>
    <circle cx="94" cy="52" r="70" fill="#080808" stroke="#d4af37" stroke-width="6"/>
    <circle cx="94" cy="52" r="22" fill="#7a1717"/>
