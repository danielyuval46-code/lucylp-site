  <path d="M0 488 C160 430 310 522 492 468 C650 420 776 420 900 372 L900 620 L0 620 Z" fill="#030303" opacity="0.8"/>
  <text x="58" y="84" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="900" fill="#f6e7b0">Berlin</text>
  <text x="58" y="134" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="900" fill="#fff6d7">Flea Market Finds</text>
