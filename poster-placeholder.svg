  <text x="280" y="344" text-anchor="middle" fill="#f6e7b0" font-family="Georgia, 'Times New Roman', serif" font-size="44" letter-spacing="6">RARE</text>
  <text x="280" y="398" text-anchor="middle" fill="#d4af37" font-family="Arial, sans-serif" font-size="18" letter-spacing="7">POSTER FIND</text>
