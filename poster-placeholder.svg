<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 760" role="img" aria-labelledby="title desc">
  <title id="title">LucyLP poster placeholder artwork</title>
  <desc id="desc">Luxury black and gold collectible poster placeholder for LucyLP poster cards.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="0.52" stop-color="#080808"/>
      <stop offset="1" stop-color="#1b1608"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0" stop-color="#f6e7b0" stop-opacity="0.34"/>
      <stop offset="0.38" stop-color="#d4af37" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
